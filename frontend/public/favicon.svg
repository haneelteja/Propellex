<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#1E3A5F"/>

  <!-- Skyscraper body (navy building) -->
  <rect x="20" y="28" width="24" height="24" fill="#2D5A8E" rx="1"/>

  <!-- Building floors / windows -->
  <rect x="23" y="31" width="4" height="3" fill="#C9A84C" rx="0.5"/>
  <rect x="30" y="31" width="4" height="3" fill="#C9A84C" rx="0.5"/>
  <rect x="37" y="31" width="4" height="3" fill="#C9A84C" rx="0.5"/>

  <rect x="23" y="37" width="4" height="3" fill="#C9A84C" rx="0.5"/>
  <rect x="30" y="37" width="4" height="3" fill="#C9A84C" rx="0.5"/>
  <rect x="37" y="37" width="4" height="3" fill="#C9A84C" rx="0.5"/>

  <rect x="23" y="43" width="4" height="4" fill="#C9A84C" rx="0.5"/>
  <rect x="37" y="43" width="4" height="4" fill="#C9A84C" rx="0.5"/>

  <!-- Central door -->
  <rect x="29" y="43" width="6" height="9" fill="#1E3A5F" rx="0.5"/>

  <!-- Upper tower -->
  <rect x="26" y="18" width="12" height="12" fill="#1E4A7F" rx="1"/>

  <!-- Gold spire -->
  <polygon points="32,4 29,18 35,18" fill="#C9A84C"/>

  <!-- "P" lettermark on upper tower -->
  <text x="32" y="28" font-family="Georgia, serif" font-size="8" font-weight="bold"
        fill="#E8C96A" text-anchor="middle" dominant-baseline="auto">P</text>
</svg>

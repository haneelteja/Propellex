services:
  # ── Backend API (Node.js) ───────────────────────────────────────────────────
  - type: web
    name: propellex-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false       # set manually in Render dashboard
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: AI_SERVICE_URL
        fromService:
          name: propellex-ai
          type: web
          property: host
      - key: CORS_ORIGIN
        sync: false       # set to your Vercel URL e.g. https://propellex.vercel.app

  # ── AI Service (Python FastAPI) ─────────────────────────────────────────────
  - type: web
    name: propellex-ai
    runtime: python
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NODE_ENV
        value: production

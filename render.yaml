services:
  # ── Backend API (Node.js) ───────────────────────────────────────────────────
  - type: web
    name: propellex-backend
    runtime: node
    buildCommand: cd backend && npm install --include=dev && npm run build
    startCommand: cd backend && node dist/server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: AI_SERVICE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false

  # ── AI Service (Python FastAPI) ─────────────────────────────────────────────
  - type: web
    name: propellex-ai
    runtime: python
    buildCommand: cd ai-service && pip install -r requirements.txt
    startCommand: cd ai-service && uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NODE_ENV
        value: production

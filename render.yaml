services:
  # ── Backend API (Node.js) ───────────────────────────────────────────────────
  - type: web
    name: propellex-backend
    runtime: node
    buildCommand: cd backend && npm install --include=dev && npm run build
    startCommand: cd backend && node dist/server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: AI_SERVICE_URL
        value: http://localhost:8001
      - key: CORS_ORIGIN
        sync: false

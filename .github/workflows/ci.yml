name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Job 1: Code Quality Checks
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Detect project type
      id: detect
      run: |
        if [ -f "package.json" ]; then
          echo "type=nodejs" >> $GITHUB_OUTPUT
        elif [ -f "requirements.txt" ] || [ -f "setup.py" ] || [ -f "pyproject.toml" ]; then
          echo "type=python" >> $GITHUB_OUTPUT
        else
          echo "type=generic" >> $GITHUB_OUTPUT
        fi
    
    # Node.js specific steps
    - name: Setup Node.js
      if: steps.detect.outputs.type == 'nodejs'
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies (Node.js)
      if: steps.detect.outputs.type == 'nodejs'
      run: npm ci
    
    - name: Run linter (Node.js)
      if: steps.detect.outputs.type == 'nodejs'
      run: |
        if npm run | grep -q "lint"; then
          npm run lint
        else
          echo "No lint script found, skipping..."
        fi
    
    # Python specific steps
    - name: Setup Python
      if: steps.detect.outputs.type == 'python'
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies (Python)
      if: steps.detect.outputs.type == 'python'
      run: |
        if [ -f "requirements.txt" ]; then
          pip install -r requirements.txt
        elif [ -f "pyproject.toml" ]; then
          pip install -e .
        fi
    
    - name: Run linter (Python)
      if: steps.detect.outputs.type == 'python'
      run: |
        if command -v pylint &> /dev/null; then
          pylint **/*.py || true
        elif command -v flake8 &> /dev/null; then
          flake8 . || true
        else
          echo "No linter found, skipping..."
        fi
      continue-on-error: true

  # Job 2: Run Tests
  test:
    name: Run Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Detect project type
      id: detect
      run: |
        if [ -f "package.json" ]; then
          echo "type=nodejs" >> $GITHUB_OUTPUT
        elif [ -f "requirements.txt" ] || [ -f "setup.py" ] || [ -f "pyproject.toml" ]; then
          echo "type=python" >> $GITHUB_OUTPUT
        else
          echo "type=generic" >> $GITHUB_OUTPUT
        fi
      shell: bash
    
    - name: Setup Node.js
      if: steps.detect.outputs.type == 'nodejs'
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies (Node.js)
      if: steps.detect.outputs.type == 'nodejs'
      run: npm ci
    
    - name: Run tests (Node.js)
      if: steps.detect.outputs.type == 'nodejs'
      run: |
        if npm run | grep -q "test"; then
          npm test
        else
          echo "No test script found, skipping..."
        fi
      continue-on-error: true
    
    - name: Setup Python
      if: steps.detect.outputs.type == 'python'
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies (Python)
      if: steps.detect.outputs.type == 'python'
      run: |
        if [ -f "requirements.txt" ]; then
          pip install -r requirements.txt
        elif [ -f "pyproject.toml" ]; then
          pip install -e .
        fi
    
    - name: Run tests (Python)
      if: steps.detect.outputs.type == 'python'
      run: |
        if command -v pytest &> /dev/null; then
          pytest
        elif [ -f "setup.py" ]; then
          python -m unittest discover
        else
          echo "No test framework found, skipping..."
        fi
      continue-on-error: true

  # Job 3: Security Scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
      continue-on-error: true
    
    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
      continue-on-error: true

  # Job 4: Build (if applicable)
  build:
    name: Build Project
    runs-on: ubuntu-latest
    needs: [code-quality, test]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Detect project type
      id: detect
      run: |
        if [ -f "package.json" ]; then
          echo "type=nodejs" >> $GITHUB_OUTPUT
        elif [ -f "requirements.txt" ] || [ -f "setup.py" ] || [ -f "pyproject.toml" ]; then
          echo "type=python" >> $GITHUB_OUTPUT
        else
          echo "type=generic" >> $GITHUB_OUTPUT
        fi
    
    - name: Setup Node.js
      if: steps.detect.outputs.type == 'nodejs'
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies (Node.js)
      if: steps.detect.outputs.type == 'nodejs'
      run: npm ci
    
    - name: Build (Node.js)
      if: steps.detect.outputs.type == 'nodejs'
      run: |
        if npm run | grep -q "build"; then
          npm run build
        else
          echo "No build script found, skipping..."
        fi
      continue-on-error: true


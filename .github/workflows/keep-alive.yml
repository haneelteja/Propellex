name: Keep Render Services Alive

on:
  schedule:
    - cron: '*/5 * * * *'  # every 5 minutes
  workflow_dispatch:        # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: curl -sf https://propellex-backend.onrender.com/health || true

      - name: Ping AI service
        run: curl -sf https://propellex-api-ai.onrender.com/health || true
